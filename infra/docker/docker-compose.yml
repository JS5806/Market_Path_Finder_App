# =============================================================================
# Market Path Finder - Docker Compose (풀스택)
# PostgreSQL + Mosquitto + FastAPI Backend
# 라즈베리 파이 5: git pull → docker-compose up -d
# =============================================================================

version: '3.8'

services:
  # ── PostgreSQL 데이터베이스 ──
  postgres:
    image: postgres:15-alpine
    container_name: mart_postgres
    environment:
      POSTGRES_DB: mart_path_db
      POSTGRES_USER: mart_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docs/schema_design.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ../../docs/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mart_user -d mart_path_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT Broker ──
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mart_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ── FastAPI Backend ──
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: mart_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mart_user:${DB_PASSWORD:-changeme}@postgres:5432/mart_path_db
      DATABASE_URL_SYNC: postgresql://mart_user:${DB_PASSWORD:-changeme}@postgres:5432/mart_path_db
      SECRET_KEY: ${SECRET_KEY:-production-secret-change-this}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      LLM_API_BASE: ${LLM_API_BASE:-http://192.168.0.100:8000/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-llama3-ko}
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DEBUG: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
