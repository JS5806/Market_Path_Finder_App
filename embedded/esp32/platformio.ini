; =============================================================================
; Market Path Finder - ESP32 ESL Controller
; E-Ink 디스플레이 제어 및 MQTT 통신
; 이재상 님이 직접 하드웨어 연동 시 사용할 설정 파일
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8       ; MQTT 클라이언트
    zinggjm/GxEPD2@^1.5.8             ; E-Ink 디스플레이 드라이버
    bblanchon/ArduinoJson@^7.2.0       ; JSON 파싱
